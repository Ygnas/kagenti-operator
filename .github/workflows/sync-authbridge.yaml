# Sync authbridge/ from kagenti/kagenti-extensions.
#
# AuthBridge is maintained upstream in kagenti/kagenti-extensions/authbridge
# and synced into this repository at authbridge/.
#
# This workflow is manual-only (workflow_dispatch). It clones the upstream
# repo, copies only the authbridge/ subdirectory (filtering out repo-level
# files), preserves any ODH-specific files, and opens a PR.
#
# See: https://redhat.atlassian.net/browse/RHAIENG-5705

name: Sync AuthBridge

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to sync from in kagenti/kagenti-extensions"
        required: false
        default: "main"
      dry_run:
        description: "Dry run — show diff without creating a PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync authbridge from upstream
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: https://github.com/kagenti/kagenti-extensions.git
      UPSTREAM_SUBDIR: authbridge
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream (sparse — authbridge/ only)
        run: |
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            --branch "${{ inputs.source_branch }}" \
            "${UPSTREAM_REPO}" \
            /tmp/kagenti-extensions

          cd /tmp/kagenti-extensions
          git sparse-checkout set "${UPSTREAM_SUBDIR}"

          echo "::notice::Upstream authbridge/ checked out at $(git rev-parse --short HEAD)"
          echo "UPSTREAM_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Save ODH-specific files
        run: |
          mkdir -p /tmp/odh-preserve
          PRESERVED=0

          if [ -d "authbridge" ]; then
            cd authbridge
            for f in $(find . -type f); do
              UPSTREAM_PATH="/tmp/kagenti-extensions/authbridge/${f#./}"
              if [ ! -f "${UPSTREAM_PATH}" ]; then
                mkdir -p "/tmp/odh-preserve/$(dirname "$f")"
                cp "$f" "/tmp/odh-preserve/$f"
                echo "  preserved: ${f#./}"
                PRESERVED=$((PRESERVED + 1))
              fi
            done
            cd ..
          fi

          echo "PRESERVED_COUNT=${PRESERVED}" >> "$GITHUB_ENV"
          echo "::notice::Preserved ${PRESERVED} ODH-specific file(s)."

      - name: Sync authbridge directory
        run: |
          # Use rsync to bring upstream authbridge/ into the local tree.
          # --delete removes files that no longer exist upstream (except
          # ODH-specific files which are restored in the next step).
          rsync -a --delete \
            /tmp/kagenti-extensions/authbridge/ \
            authbridge/

      - name: Restore ODH-specific files
        if: env.PRESERVED_COUNT != '0'
        run: |
          cp -r /tmp/odh-preserve/* authbridge/ 2>/dev/null || true
          echo "::notice::Restored ${PRESERVED_COUNT} ODH-specific file(s)."

      - name: Check for changes
        id: changes
        run: |
          git add -A authbridge/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes detected — authbridge/ is already up to date."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Changes detected:"
            git diff --cached --stat
          fi

      - name: Show diff (dry run)
        if: inputs.dry_run && steps.changes.outputs.has_changes == 'true'
        run: |
          echo "=== DRY RUN — Changes that would be synced ==="
          git diff --cached --stat
          echo ""
          echo "=== Files changed ==="
          git diff --cached --name-only
          echo ""
          echo "=== Detailed diff ==="
          git diff --cached

      - name: Create sync branch and commit
        if: "!inputs.dry_run && steps.changes.outputs.has_changes == 'true'"
        run: |
          BRANCH_NAME="sync/authbridge-$(date +%Y-%m-%d-%H%M%S)"
          echo "SYNC_BRANCH=${BRANCH_NAME}" >> "$GITHUB_ENV"
          git checkout -b "${BRANCH_NAME}"

          git commit -m "sync: update authbridge from kagenti-extensions (${UPSTREAM_SHA})

          Synced authbridge/ directory from kagenti/kagenti-extensions.
          Upstream branch: ${{ inputs.source_branch }}
          Upstream commit: ${UPSTREAM_SHA}

          Source: https://github.com/kagenti/kagenti-extensions/tree/${{ inputs.source_branch }}/authbridge"

      - name: Push sync branch
        if: "!inputs.dry_run && steps.changes.outputs.has_changes == 'true'"
        run: |
          git push origin "${SYNC_BRANCH}"

      - name: Create Pull Request
        if: "!inputs.dry_run && steps.changes.outputs.has_changes == 'true'"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRESERVED_NOTE=""
          if [ "${PRESERVED_COUNT}" -gt 0 ]; then
            PRESERVED_NOTE="
          > **Note:** ${PRESERVED_COUNT} ODH-specific file(s) were preserved during sync."
          fi

          gh pr create \
            --title "sync: Update authbridge from kagenti-extensions ($(date +%Y-%m-%d))" \
            --body "## AuthBridge Sync

          Syncs \`authbridge/\` from [kagenti/kagenti-extensions](https://github.com/kagenti/kagenti-extensions/tree/${{ inputs.source_branch }}/authbridge) (branch: \`${{ inputs.source_branch }}\`, commit: \`${UPSTREAM_SHA}\`).
          ${PRESERVED_NOTE}

          ### Changes

          \`\`\`
          $(git diff --stat HEAD~1..HEAD)
          \`\`\`

          ### How to verify

          1. Review the file changes to ensure upstream authbridge updates are correct
          2. Confirm no ODH-specific files were accidentally removed
          3. CI should pass (authbridge builds are validated by Tekton pipelines)

          ### References

          - Upstream source: https://github.com/kagenti/kagenti-extensions/tree/${{ inputs.source_branch }}/authbridge
          - Jira: [RHAIENG-5705](https://redhat.atlassian.net/browse/RHAIENG-5705)
          " \
            --base main \
            --head "${SYNC_BRANCH}"

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "false" ]; then
            echo "### AuthBridge is already up to date" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes detected between \`authbridge/\` and upstream \`kagenti-extensions/${{ inputs.source_branch }}\`." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "### Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Changes were detected but no PR was created (dry run mode)." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Changed files" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git diff --cached --stat >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Sync PR Created" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "A pull request has been created to sync authbridge from upstream." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Upstream commit:** \`${UPSTREAM_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Branch:** \`${{ inputs.source_branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
